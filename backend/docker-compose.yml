services:
  api:
    build: .
    ports:
      - "4000:4000"
    env_file:
      - .env
    depends_on:
      - db
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: staffora_hrms
    ports:
      - "5432:5432"
    volumes:
      - staffora_db:/var/lib/postgresql/data

volumes:
  staffora_db:
